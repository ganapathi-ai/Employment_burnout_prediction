version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# Standalone monitoring stack.
# API runs locally via `uvicorn api.main:app --host 0.0.0.0 --port 8000`
#
# Usage:
#   docker-compose -f docker-compose-monitoring.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: burnout_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=7d'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    container_name: burnout_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      # 1. Datasource: Prometheus connection
      - ./monitoring/grafana_datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      # 2. Dashboard provider config (tells Grafana WHERE to find dashboard JSON files)
      - ./monitoring/grafana_provisioning/dashboards_provider.yml:/etc/grafana/provisioning/dashboards/dashboards_provider.yml
      # 3. Dashboard JSON files go to a clean path with no existing Grafana content
      - ./monitoring/grafana_provisioning/dashboards:/var/lib/grafana/dashboards
    depends_on:
      prometheus:
        condition: service_healthy
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
