name: Frontend CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with Flake8 (critical errors)
      run: |
        flake8 frontend/ --count --select=E9,F63,F7,F82 --show-source --statistics
        echo "Flake8 critical check passed"

    - name: Lint with Flake8 (style)
      run: |
        flake8 frontend/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

    - name: Lint with Pylint
      run: |
        pylint frontend/streamlit_app.py --exit-zero --fail-under=6.0
        echo "Pylint check passed"

    - name: Check Streamlit syntax (compile)
      run: |
        python -m py_compile frontend/streamlit_app.py
        echo "Streamlit syntax check passed"

    - name: Run frontend AST parse test
      run: |
        python -c "
        import ast, sys
        with open('frontend/streamlit_app.py') as f:
            source = f.read()
        try:
            ast.parse(source)
            print('Frontend AST parse passed')
        except SyntaxError as e:
            print('Syntax error: ' + str(e))
            sys.exit(1)
        "

  deploy-frontend:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Deploy Frontend to Render
      run: |
        curl -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}"
        echo "Frontend deployment triggered"
